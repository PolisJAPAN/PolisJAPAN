<p>気になるテーマを保存できる<strong>お気に入り機能</strong>を追加しました。</p>
<h3>お気に入りの登録</h3>
<ul>
    <li>テーマ一覧の各カード左下、またはテーマ詳細ページの<i class="bi bi-star"></i>ボタンを押すと、お気に入りに登録できます</li>
    <li>もう一度押すと解除できます</li>
</ul>
<img src="./notice/img/004-card-star.png?v=4" width="366" alt="テーマカードの左下にお気に入りボタン（星マーク）が表示されている画面">
<h3>お気に入りで絞り込み</h3>
<p>一覧上部のタブに<strong>「全て」「<i class="bi bi-star-fill"></i> お気に入り」</strong>を追加しました。お気に入りタブで、登録したテーマだけを表示できます。</p>
<img src="./notice/img/004-fav-tab.png?v=4" width="229" alt="テーマ一覧上部の「全て」「お気に入り」タブ">
<div class="notice-box">
    お気に入りはお使いのブラウザ内に保存されます。端末やブラウザを変えた場合や、プライベートブラウズでは引き継がれません。
</div>
