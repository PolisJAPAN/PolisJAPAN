<p>テーマ一覧が使いやすくなりました。</p>
<h3>新しい並び替え</h3>
<ul>
    <li><strong>更新順</strong>（標準）: 投票や意見など、動きのあったテーマから順に表示します</li>
    <li><strong>意見順</strong>: 新しい意見が投稿されたテーマから順に表示します</li>
</ul>
<h3>日時の表示</h3>
<p>各テーマカードに<strong>更新</strong>の日時を表示するようになりました。</p>
<div class="notice-box">
    日時と並び替えは、この機能の追加以降に動きのあったテーマから順次反映されます。
</div>
