server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ブラウザキャッシュを全面的に無効化
    etag off;
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;

    # ルート配信
    location / {
        try_files $uri $uri/ =404;
    }

    # 上流のDNSを毎回引き直す（proxy_passに変数を使うと起動時解決ではなくresolver経由になる。
    # 固定だとCloudFrontのIPローテーションで upstream timed out になる）
    resolver 127.0.0.11 valid=30s ipv6=off;

    # 本番CSVの読み取りプロキシ（常に最新の本番データで確認できる。書き込みは発生しない）
    location /csv/ {
        set $csv_upstream https://app.pol-is.jp;
        proxy_pass $csv_upstream;
        proxy_set_header Host app.pol-is.jp;
        proxy_ssl_server_name on;
        proxy_connect_timeout 5s;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store" always;
    }

    # 本番APIへのsame-originプロキシ（localhostはCORS許可外のため。/api/xxx → api.pol-is.jp/xxx）
    # 注意: /api/theme/post_draft は本番に実投稿される（docs/クライアント動作確認ガイド.md 参照）
    location /api/ {
        set $api_upstream https://api.pol-is.jp;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $api_upstream;
        proxy_set_header Host api.pol-is.jp;
        proxy_ssl_server_name on;
        proxy_connect_timeout 5s;
    }

    # Gzip（軽量）
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
